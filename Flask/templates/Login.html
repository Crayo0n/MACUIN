<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACUIN - Iniciar Sesión</title>
    <link rel="stylesheet" href="/Flask/static/css/Login.css">
</head>
<body class="login-body">

    <div class="login-layout">
        <div class="login-hero" style="background-image: url('images/loginbacground.png');">
            <div class="hero-overlay"></div>
            
            <div class="hero-content">
                <div class="hero-logo">
                    <img src="/Flask/static/images/LOGO.png" alt="M Logo" class="logo-square">
                    <span class="logo-text-large">MACUIN</span>
                </div>

                <div class="hero-title-container">
                    <h1 class="hero-title">
                        Bienvenido <br>
                        a la <br>
                        red de <br>
                        Distribución,<br>
                        <span class="text-blue-highlight">Excelencia en<br>el Servicio</span>
                    </h1>
                </div>

                <div class="hero-footer">
                    <img src="Flask/static/images/iconose.png" alt="Shield">
                    <span>Administración del Personal Autorizado</span>
                </div>
            </div>
        </div>

        <div class="login-form-section">
            <div class="login-card">
                <div class="card-header">
                    <img src="Flask/static/images/casita.png" alt="Portal" class="portal-icon">
                    <h2 class="portal-title">Bienvenido</h2>
                </div>
                
                <div class="card-body">
                   
                    <p class="welcome-subtitle">Ingresa tus credenciales para iniciar sesión</p>
                    
                    <form class="login-form">
                        <div class="form-group">
                            <label class="input-label">
                                <img src="Flask/static/images/mensaje.png" alt="Email" class="label-icon">
                                Email
                            </label>
                            <input type="email" placeholder="tunombre@macuin.com" class="input-light-gray">
                        </div>
                        
                        <div class="form-group">
                            <div class="label-row flex-between">
                                <label class="input-label">
                                    <img src="Flask/static/images/candado.png" alt="Lock" class="label-icon">
                                    Contraseña
                                </label>
                                <a href="#" class="forgot-password">Olvidaste tu contraseña?</a>
                            </div>
                            <div class="input-with-icon">
                                <input type="password" placeholder="••••••••••••" class="input-light-gray">
                                <img src="Flask/static/images/elojo.png" alt="Show" class="input-icon-right">
                            </div>
                        </div>
                        
                        <div class="checkbox-group">
                            <input type="checkbox" id="remember" class="custom-checkbox">
                            <label for="remember">Recordar este dispositivo</label>
                        </div>
                        <div class="button-group">
                            <button type="submit" class="btn-primary btn-block btn-large">Iniciar Sesión</button>
                            <button type="button" class="btn-outline btn-block btn-large">Registrarse</button>
                        </div>
                        
                    </form>
                </div>
            </div>
            
            <div class="internal-use-text">
                SOLO USO DE PERSONAL INTERNO
            </div>
            
            <div class="copyright-text">
                © 2026 MACUIN AutoPartes
            </div>
        </div>
    </div>

</body>
</html>
