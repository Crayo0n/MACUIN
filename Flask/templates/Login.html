{% extends "Base.html" %}
{% block title %}Iniciar Sesión - MACUIN Premium{% endblock %}

{% block content %}
<div class="flex-grow flex items-center justify-center py-12 relative">
    <!-- Componente decorativo -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-brand-600/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="glass-card w-full max-w-md rounded-3xl p-8 relative z-10 border border-slate-700/50">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center shadow-lg shadow-brand-500/20 mx-auto mb-4">
                <i class="fa-solid fa-right-to-bracket text-white text-2xl"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-white tracking-tight">Bienvenido a MACUIN</h2>
            <p class="text-slate-400 mt-2 text-sm">Ingresa tus credenciales para acceder a tu cuenta VIP.</p>
        </div>

        <form class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5 ml-1">Correo Electrónico</label>
                <div class="relative">
                    <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="email" class="w-full bg-dark-bg border border-dark-border rounded-xl pl-11 pr-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all placeholder:-slate-600" placeholder="tu@email.com">
                </div>
            </div>

            <div>
                <div class="flex justify-between mb-1.5 ml-1">
                    <label class="block text-sm font-medium text-slate-300">Contraseña</label>
                    <a href="#" class="text-xs font-semibold text-brand-400 hover:text-brand-300 transition-colors">¿Olvidaste tu contraseña?</a>
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="password" class="w-full bg-dark-bg border border-dark-border rounded-xl pl-11 pr-10 py-3 text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all placeholder:-slate-600" placeholder="••••••••">
                    <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center mt-6">
                <input id="remember" type="checkbox" class="w-4 h-4 bg-dark-bg border-dark-border rounded text-brand-500 focus:ring-brand-500 cursor-pointer">
                <label for="remember" class="ml-2 block text-sm text-slate-400 cursor-pointer">
                    Recordar este dispositivo
                </label>
            </div>

            <div class="button-group flex flex-col gap-3 mt-6">
                <button type="button" class="w-full bg-gradient-to-r from-brand-600 to-purple-600 hover:from-brand-500 hover:to-purple-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-brand-500/25 transition-all transform hover:-translate-y-0.5">
                    Iniciar Sesión
                </button>
                <a href="/registro" class="w-full text-center bg-transparent border border-slate-600 hover:border-slate-400 text-white font-bold py-3.5 px-4 rounded-xl transition-all hover:bg-slate-800">
                    Únete como cliente VIP
                </a>
            </div>
        </form>

        <p class="mt-8 text-center text-xs text-slate-500 uppercase tracking-widest font-semibold">
            Portal Seguro MACUIN Premium
        </p>
    </div>
</div>
{% endblock %}
