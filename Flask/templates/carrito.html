<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MACUIN - Carrito</title>

<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/carrito.css">

</head>

<body>

<nav class="navbar">

<div class="logo">MACUIN</div>

<ul class="menu">
<li><a href="/">Inicio</a></li>
<li><a href="/catalogo">Catálogo</a></li>
<li><a href="/pedidos">Mis pedidos</a></li>
<li><a href="/carrito">Carrito</a></li>
<li><a href="/perfil">Mi cuenta</a></li>
</ul>

<input class="search" placeholder="Buscar producto...">

</nav>


<section class="header">

<h1>Tu Carrito</h1>
<p>Revisa los productos antes de finalizar tu compra</p>

</section>


<section class="carrito-grid">

<div class="productos">

<div class="card item">

<img src="/static/img/Frenos.jpg">

<div class="info">

<h3>Frenos de disco delanteros</h3>

<span class="precio">$1,000</span>

<div class="acciones">

<button class="cantidad">-</button>
<span>1</span>
<button class="cantidad">+</button>

</div>

</div>

</div>


<div class="card item">

<img src="/static/img/filtro_aceite.jpg">

<div class="info">

<h3>Filtro de aceite premium</h3>

<span class="precio">$350</span>

<div class="acciones">

<button class="cantidad">-</button>
<span>1</span>
<button class="cantidad">+</button>

</div>

</div>

</div>

</div>


<div class="card resumen">

<h2>Resumen de compra</h2>

<div class="linea">
<span>Subtotal</span>
<span>$1,350</span>
</div>

<div class="linea">
<span>IVA</span>
<span>$216</span>
</div>

<div class="linea total">
<span>Total</span>
<span>$1,566</span>
</div>

<button class="checkout">
Finalizar compra
</button>

</div>

</section>

</body>
</html>
