<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MACUIN Premium{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        },
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .text-gradient {
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-dark-bg text-slate-200 min-h-screen flex flex-col selection:bg-brand-500 selection:text-white">
    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 border-b border-dark-border">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Branding -->
                <a href="/" class="flex-shrink-0 flex items-center gap-3 hover:opacity-80 transition-opacity">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center shadow-lg shadow-brand-500/30">
                        <i class="fa-solid fa-car-side text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-xl tracking-tight text-gradient">MACUIN</h1>
                        <p class="text-[0.65rem] uppercase tracking-widest text-slate-400 font-semibold -mt-1">Autopartes Dist.</p>
                    </div>
                </a>

                <!-- Desktop Menu -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-6">
                        <a href="/" class="hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors"><i class="fa-solid fa-house mr-2 text-brand-500"></i>Inicio</a>
                        <a href="/catalogo" class="hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors"><i class="fa-solid fa-layer-group mr-2 text-brand-500"></i>Catálogo</a>
                        <a href="/carrito" class="hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors"><i class="fa-solid fa-cart-shopping mr-2 text-brand-500"></i>Carrito <span class="bg-brand-600 text-white text-xs px-2 py-0.5 rounded-full ml-1">3</span></a>
                        <a href="/pedidos" class="hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors"><i class="fa-solid fa-box-open mr-2 text-brand-500"></i>Mis Pedidos</a>
                    </div>
                </div>

                <!-- User Profile -->
                <div class="hidden md:flex items-center gap-4">
                    <button class="text-slate-400 hover:text-white transition-colors relative">
                        <i class="fa-solid fa-bell text-xl"></i>
                        <span class="absolute top-0 right-0 block h-2 w-2 rounded-full ring-2 ring-dark-bg bg-red-500"></span>
                    </button>
                    <div class="flex items-center gap-3 pl-4 border-l border-dark-border cursor-pointer hover:bg-dark-card p-2 rounded-lg transition-colors" onclick="window.location.href='/perfil'">
                        <div class="text-right">
                            <p class="text-sm font-semibold text-white">Mauricio</p>
                            <p class="text-xs text-brand-500 font-medium">Cliente VIP</p>
                        </div>
                        <img class="h-9 w-9 rounded-full object-cover ring-2 ring-brand-500/50" src="https://i.pravatar.cc/150?u=mauricio" alt="Avatar">
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex flex-col">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="glass border-t border-dark-border mt-auto">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-sm text-slate-400">© 2026 MACUIN Premium. Todos los derechos reservados.</p>
            <div class="flex gap-4">
                <a href="#" class="text-slate-400 hover:text-brand-500 transition-colors"><i class="fa-brands fa-twitter"></i></a>
                <a href="#" class="text-slate-400 hover:text-brand-500 transition-colors"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="text-slate-400 hover:text-brand-500 transition-colors"><i class="fa-brands fa-linkedin"></i></a>
            </div>
        </div>
    </footer>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
