{% extends "Base.html" %}
{% block title %}Mi Perfil - MACUIN Premium{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">Mi Perfil</h1>
    <p class="text-slate-400">Gestiona tu información y preferencias.</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-8 relative z-10">
    <!-- Sidebar Perfil -->
    <div class="md:col-span-1">
        <div class="glass-card rounded-2xl p-6 border border-slate-700/50 text-center">
            <div class="relative w-32 h-32 mx-auto mb-4">
                <img src="https://i.pravatar.cc/300?u=mauricio" alt="Avatar" class="w-full h-full rounded-full object-cover border-4 border-dark-card shadow-lg shadow-brand-500/20 z-10 relative">
                <button class="absolute bottom-0 right-0 bg-brand-500 text-white w-10 h-10 rounded-full flex items-center justify-center border-4 border-dark-card z-20 hover:bg-brand-600 transition-colors">
                    <i class="fa-solid fa-camera"></i>
                </button>
            </div>
            <h2 class="text-xl font-bold text-white">Mauricio Rodríguez</h2>
            <p class="text-brand-400 text-sm font-medium mb-6">Cliente VIP Nivel 3</p>
            
            <div class="flex flex-col gap-2">
                <button class="w-full bg-slate-800 text-white text-left px-4 py-3 rounded-xl font-medium border border-slate-700">
                    <i class="fa-solid fa-user mr-3 text-slate-400"></i> Datos Personales
                </button>
                <button class="w-full hover:bg-slate-800/50 text-slate-300 text-left px-4 py-3 rounded-xl font-medium transition-colors border border-transparent">
                    <i class="fa-solid fa-location-dot mr-3 text-slate-400"></i> Direcciones
                </button>
                <button class="w-full hover:bg-slate-800/50 text-slate-300 text-left px-4 py-3 rounded-xl font-medium transition-colors border border-transparent">
                    <i class="fa-regular fa-credit-card mr-3 text-slate-400"></i> Métodos de Pago
                </button>
                <button class="w-full hover:bg-slate-800/50 text-slate-300 text-left px-4 py-3 rounded-xl font-medium transition-colors border border-transparent">
                    <i class="fa-solid fa-shield-halved mr-3 text-slate-400"></i> Seguridad
                </button>
            </div>
        </div>
    </div>

    <!-- Contenido Editar Perfil -->
    <div class="md:col-span-2">
        <div class="glass-card rounded-2xl p-8 border border-slate-700/50">
            <h3 class="text-xl font-bold text-white mb-6 border-b border-dark-border pb-4">Actualizar Datos Personales</h3>
            
            <form class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Nombre(s)</label>
                        <input type="text" class="w-full bg-dark-bg border border-dark-border rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all font-medium" value="Mauricio">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Apellidos</label>
                        <input type="text" class="w-full bg-dark-bg border border-dark-border rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all font-medium" value="Rodríguez">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Correo Electrónico</label>
                    <input type="email" class="w-full bg-dark-bg border border-dark-border rounded-xl px-4 py-3 text-slate-300 focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all cursor-not-allowed" value="mauricio@ejemplo.com" disabled>
                    <p class="text-xs text-slate-500 mt-2"><i class="fa-solid fa-circle-info mr-1"></i> El correo no puede ser modificado por seguridad.</p>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Teléfono Móvil</label>
                    <input type="tel" class="w-full bg-dark-bg border border-dark-border rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all font-medium" value="+52 55 1234 5678">
                </div>

                <div class="pt-4 border-t border-dark-border">
                    <button type="button" class="bg-brand-600 hover:bg-brand-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-brand-500/25 transition-all transform hover:-translate-y-0.5">
                        Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
