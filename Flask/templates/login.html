<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> MACUIN - Login </title>
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body class="login-body">
    {% include 'toasts.html' %}

    <div class="login-layout">
        <div class="login-hero" style="background-image: url('/static/img/loginbacground.png');">
            <div class="hero-overlay"></div>
            
            <div class="hero-content">
                <div class="hero-logo">
                    <img src="/static/img/LOGO.png" alt="M Logo" class="logo-square">
                    <span class="logo-text-large">MACUIN</span>
                </div>

                <div class="hero-title-container">
                    <h1 class="hero-title">
                        Bienvenido <br>
                        a la <br>
                        red de <br>
                        Distribución,<br>
                        <span class="text-blue-highlight">Excelencia en<br>el Servicio</span>
                    </h1>
                </div>

                <div class="hero-footer">
                    <img src="/static/img/iconose.png" alt="Shield">
                    <span>Administración del Personal Autorizado</span>
                </div>
            </div>
        </div>

        <div class="login-form-section">
            <div class="login-card">
                <div class="card-header">
                    <img src="/static/img/casita.png" alt="Portal" class="portal-icon">
                    <h2 class="portal-title">Bienvenido</h2>
                </div>
                
                <div class="card-body">
                    <p class="welcome-subtitle">Ingresa tus credenciales para iniciar sesión</p>
                    


                    <form class="login-form" action="/login" method="POST">
                        <div class="form-group">
                            <label class="input-label">
                                <img src="/static/img/mensaje.png" alt="Email" class="label-icon">
                                Email
                            </label>
                            <input type="email" name="email" placeholder="tunombre@macuin.com" class="input-light-gray" >
                        </div>
                        
                        <div class="form-group">
                            <div class="label-row flex-between">
                                <label class="input-label">
                                    <img src="/static/img/candado.png" alt="Lock" class="label-icon">
                                    Contraseña
                                </label>
                            </div>
                            <div class="input-with-icon">
                                <input type="password" name="password" placeholder="••••••••••••" class="input-light-gray" >
                                <img src="/static/img/elojo.png" alt="Show" class="input-icon-right">
                            </div>
                        </div>
                        
                        <div class="button-group">
                            <button type="submit" class="btn-primary btn-block btn-large">Iniciar Sesión</button>
                            <a href="/registro" class="btn-outline btn-block btn-large" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">Registrarse</a>
                        </div>
                        
                    </form>
                </div>
            </div>
            
            <div class="copyright-text">
                © 2026 MACUIN AutoPartes
            </div>
        </div>
    </div>

</body>
</html>"
