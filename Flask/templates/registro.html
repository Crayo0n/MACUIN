<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACUIN - Registro de Usuario</title>
    <link rel="stylesheet" href="/static/css/registro.css">
</head>
<body class="reg-body">
    {% include 'toasts.html' %}

    <div class="main-container">
        <div class="left-panel">
            <a href="/login" class="btn-back">
                <span class="arrow">←</span> Volver al inicio
            </a>
            <div class="side-branding">
                <img src="/static/img/LOGO.png" alt="Logo" class="mini-logo">
                <p>Excelencia en el Servicio</p>
            </div>
        </div>

        <div class="form-panel">
            <div class="form-card">
                <div class="card-header-blue">
                    <h2>Crea una cuenta</h2>
                </div>



                <form class="reg-form" action="/registro" method="POST">
                    <div class="input-group">
                        <label>Nombre Completo</label>
                        <input type="text" name="nombre" placeholder="Ej. Juan Pérez" required>
                    </div>

                    <div class="input-group">
                        <label>Email Corporativo</label>
                        <input type="email" name="email" placeholder="usuario@macuin.com" required>
                    </div>

                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" name="password" placeholder="••••••••" required minlength="6">
                    </div>

                    <div class="terms-container">
                        <label class="custom-checkbox">
                            <input type="checkbox" required>
                            <span class="checkmark"></span>
                            He leído y acepto los <b>TÉRMINOS Y CONDICIONES</b>
                        </label>
                    </div>

                    <button type="submit" class="btn-submit">Registrarse</button>
                </form>

                <p class="reg-footer">© 2026 MACUIN AutoPartes</p>
            </div>
        </div>
    </div>

</body>
</html>
